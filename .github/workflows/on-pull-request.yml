name: Check PR

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  NF4_LARGE_BLOCK_TEST: "true"

jobs:
  build:
    name: Check + Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry (forge, cast) - needed by build.rs
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://foundry.paradigm.xyz | bash

          # Ensure both candidate locations are on PATH for this step and later steps
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin"   >> $GITHUB_PATH
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$PATH"

          # Run foundryup no matter where the installer placed it
          if command -v foundryup >/dev/null 2>&1; then
            foundryup
          elif [ -x "$HOME/.foundry/bin/foundryup" ]; then
            "$HOME/.foundry/bin/foundryup"
          elif [ -x "$HOME/.cargo/bin/foundryup" ]; then
            "$HOME/.cargo/bin/foundryup"
          else
            echo "foundryup not found. Contents of ~/.foundry/bin and ~/.cargo/bin:"
            ls -la "$HOME/.foundry/bin" || true
            ls -la "$HOME/.cargo/bin" || true
            exit 1
          fi

          forge --version

      - name: Install Rust nightly with rustfmt & clippy
        shell: bash
        run: |
          rustup toolchain install nightly
          rustup +nightly component add rustfmt clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Node.js (for upgrades-core validator)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install upgrades-core globally and verify npx
        shell: bash
        run: |
          npm i -g @openzeppelin/upgrades-core@^1.37.0
          which node && node -v
          which npm && npm -v
          which npx && npx --version

      - name: Run cargo fmt
        run: cargo +nightly fmt

      - name: Run clippy
        run: cargo +nightly clippy --all-targets -- -D warnings

      - name: Generate keys
        run: |
          cargo build
          cargo run --release --bin key_generation

      - name: Run test
        run: cargo test

  forge:
    name: Smart Contract Unit Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry (forge, cast)
        shell: bash
        run: |
          set -euo pipefail
          curl -L https://foundry.paradigm.xyz | bash

          echo "$HOME/.foundry/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin"   >> $GITHUB_PATH
          export PATH="$HOME/.foundry/bin:$HOME/.cargo/bin:$PATH"

          if command -v foundryup >/dev/null 2>&1; then
            foundryup
          elif [ -x "$HOME/.foundry/bin/foundryup" ]; then
            "$HOME/.foundry/bin/foundryup"
          elif [ -x "$HOME/.cargo/bin/foundryup" ]; then
            "$HOME/.cargo/bin/foundryup"
          else
            echo "foundryup not found. Contents of ~/.foundry/bin and ~/.cargo/bin:"
            ls -la "$HOME/.foundry/bin" || true
            ls -la "$HOME/.cargo/bin" || true
            exit 1
          fi

          forge --version

      - name: Run Forge Tests
        run: forge test
